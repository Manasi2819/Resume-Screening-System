server {
    listen 80;
    server_name localhost;

    # Root directory where built React files are served from
    root /usr/share/nginx/html;
    index index.html;

    # Compression — makes the app load faster by gzipping files
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

    # ── Proxy API calls to the backend ────────────────────────────────────────
    # Any request starting with /api or /uploads gets forwarded to the backend
    # "backend" here is the Docker service name defined in docker-compose.yml
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Increase timeout for long AI screening requests (can take 30-60s)
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 300s;

        # Allow large file uploads (resumes up to 50MB)
        client_max_body_size 50M;
    }

    location /uploads/ {
        proxy_pass http://backend:8000/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 60s;
    }

    # ── React Router — Single Page Application support ────────────────────────
    # This is critical: if someone refreshes on /results, Nginx must serve
    # index.html (not return a 404). React Router handles the routing.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Cache static assets for performance ───────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
}
