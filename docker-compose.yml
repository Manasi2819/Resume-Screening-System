# ═══════════════════════════════════════════════════════════════════════════════
#  Resume Screening System — Docker Compose
#  Starts 4 services: frontend, backend, postgres, qdrant
#  Usage: docker-compose up --build
# ═══════════════════════════════════════════════════════════════════════════════

services:

  # ── PostgreSQL Database ──────────────────────────────────────────────────────
  # Official Postgres image from Docker Hub
  postgres:
    image: postgres:16-alpine
    container_name: resume_postgres
    restart: unless-stopped          # Restart automatically if it crashes
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-screener_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-screener_pass}
      POSTGRES_DB: ${POSTGRES_DB:-resume_screener}
    volumes:
      # Named volume — persists your data even when containers are stopped/removed
      - postgres_data:/var/lib/postgresql/data
    ports:
      # Expose DB port so you can connect with DBeaver/pgAdmin for debugging
      - "5432:5432"
    networks:
      - resume_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-screener_user} -d ${POSTGRES_DB:-resume_screener}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Qdrant Vector Database ───────────────────────────────────────────────────
  # For storing resume embeddings (semantic search)
  qdrant:
    image: qdrant/qdrant:v1.9.2
    container_name: resume_qdrant
    restart: unless-stopped
    volumes:
      # Persists vector data across restarts
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"    # HTTP API
      - "6334:6334"    # gRPC API
    networks:
      - resume_net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── FastAPI Backend ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend              # Build from the backend/ folder
      dockerfile: Dockerfile
    container_name: resume_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env               # Load all settings from your .env file
    environment:
      # Override DB host to use the Docker service name (not localhost!)
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      # Override Qdrant to use server mode (not in-memory) inside Docker
      QDRANT_USE_MEMORY: "false"
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
    volumes:
      # Mount uploads folder so PDF files persist across container restarts
      - uploads_data:/app/uploads
      # Mount HuggingFace cache so models aren't re-downloaded every restart
      - huggingface_cache:/root/.cache/huggingface
    ports:
      - "8000:8000"
    networks:
      - resume_net
    depends_on:
      postgres:
        condition: service_healthy   # Only start after postgres is ready
      qdrant:
        condition: service_healthy   # Only start after qdrant is ready
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s             # Give extra time for model downloads on first run

  # ── React Frontend ───────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend             # Build from the frontend/ folder
      dockerfile: Dockerfile
    container_name: resume_frontend
    restart: unless-stopped
    ports:
      - "3000:80"                     # Access at http://localhost:3000
    networks:
      - resume_net
    depends_on:
      backend:
        condition: service_healthy   # Only start after backend is ready
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s


# ── Networks ─────────────────────────────────────────────────────────────────
# All services share this private network and can reach each other by name
networks:
  resume_net:
    driver: bridge

# ── Volumes ──────────────────────────────────────────────────────────────────
# Named volumes — managed by Docker, persist data outside containers
volumes:
  postgres_data:     # PostgreSQL database files
  qdrant_data:       # Qdrant vector index files
  uploads_data:      # Uploaded PDF resumes
  huggingface_cache: # Downloaded AI models (~400MB-2.4GB)
